services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bot_db
    volumes:
      - pgdata:/var/lib/postgresql/data
  bot:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
volumes:
  pgdata:
